name: README Auto-Update & Snake Generation

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]

jobs:
  generate-snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00D4FF&color_dots=#0D1117,#1A3A4A,#005A7A,#00A3D4,#00D4FF
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00D4FF&color_dots=#0D1117,#1A3A4A,#005A7A,#00A3D4,#00D4FF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🐍 Auto-generate contribution snake animation"
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  update-timestamp:
    name: Update Last Synced Timestamp
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update last synced timestamp
        run: |
          TIMESTAMP=$(TZ='America/Chicago' date +"%Y-%m-%d %H:%M:%S CDT")
          sed -i "s/<!-- LAST_SYNCED -->.*/<!-- LAST_SYNCED -->$TIMESTAMP/" README.md

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⏱️ Auto-update last synced timestamp"
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
